<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .bg { fill:#0f172a; }
      .panel { fill:#1e293b; stroke:#334155; }
      .lbl { fill:#94a3b8; font-size:12px; }
      .h   { fill:#f8fafc; font-size:18px; font-weight:700; }
      .pct { font-size:48px; font-weight:800; }
      .small { fill:#cbd5e1; font-size:12px; }
      .axis { stroke:#475569; stroke-width:1; }
    </style>
  </defs>
  <rect width="1100" height="620" class="bg"/>

  <text x="30" y="40" class="h">Planta 1 — Empaque</text>
  <text x="30" y="60" class="lbl">Turno mañana · 09:42:18</text>

  <!-- 3 tarjetas -->
  <g>
    <rect x="30" y="90" width="340" height="170" class="panel" rx="10"/>
    <rect x="30" y="90" width="8" height="170" fill="#16a34a"/>
    <text x="55" y="120" class="lbl">LINEA1 · EMPAQUE</text>
    <text x="55" y="148" class="h">Empacadora 1</text>
    <text x="55" y="210" fill="#16a34a" class="pct">87%</text>
    <text x="55" y="232" class="small">Meta: 85% · Δ +2.0 pts</text>
    <text x="55" y="250" class="small">A 95%  ·  P 92%  ·  Q 99%</text>
  </g>

  <g>
    <rect x="380" y="90" width="340" height="170" class="panel" rx="10"/>
    <rect x="380" y="90" width="8" height="170" fill="#eab308"/>
    <text x="405" y="120" class="lbl">LINEA1 · EMPAQUE</text>
    <text x="405" y="148" class="h">Empacadora 2</text>
    <text x="405" y="210" fill="#eab308" class="pct">71%</text>
    <text x="405" y="232" class="small">Meta: 85% · Δ -14.0 pts</text>
    <text x="405" y="250" class="small">A 78%  ·  P 95%  ·  Q 96%</text>
  </g>

  <g>
    <rect x="730" y="90" width="340" height="170" class="panel" rx="10"/>
    <rect x="730" y="90" width="8" height="170" fill="#dc2626"/>
    <text x="755" y="120" class="lbl">LINEA2 · EMPAQUE</text>
    <text x="755" y="148" class="h">Etiquetadora</text>
    <text x="755" y="210" fill="#dc2626" class="pct">52%</text>
    <text x="755" y="232" class="small">Meta: 85% · Δ -33.0 pts</text>
    <text x="755" y="250" class="small">A 60%  ·  P 88%  ·  Q 99%</text>
  </g>

  <!-- Tendencia -->
  <rect x="30" y="290" width="640" height="300" class="panel" rx="10"/>
  <text x="50" y="320" class="h">Tendencia OEE — ultimas 8 horas</text>
  <line x1="50" y1="540" x2="650" y2="540" class="axis"/>
  <line x1="50" y1="350" x2="50" y2="540" class="axis"/>
  <line x1="50" y1="402" x2="650" y2="402" stroke="#16a34a" stroke-dasharray="4,3"/>
  <text x="610" y="396" fill="#16a34a" font-size="11">Meta 85%</text>
  <polyline fill="none" stroke="#0ea5e9" stroke-width="2.5"
            points="60,500 130,470 200,440 270,420 340,400 410,395 480,410 550,415 620,425"/>
  <polyline fill="none" stroke="#7c3aed" stroke-width="2.5"
            points="60,520 130,505 200,490 270,478 340,470 410,465 480,470 550,478 620,485"/>
  <polyline fill="none" stroke="#dc2626" stroke-width="2.5"
            points="60,530 130,520 200,508 270,500 340,495 410,496 480,498 550,500 620,505"/>
  <text x="60" y="565" class="small">— Empacadora 1   — Empacadora 2   — Etiquetadora</text>

  <!-- Pareto -->
  <rect x="685" y="290" width="385" height="300" class="panel" rx="10"/>
  <text x="705" y="320" class="h">Pareto de causas (8h)</text>
  <g transform="translate(700,540)">
    <rect x="20"  y="-150" width="40" height="150" fill="#dc2626"/>
    <rect x="80"  y="-110" width="40" height="110" fill="#dc2626"/>
    <rect x="140" y="-80"  width="40" height="80"  fill="#dc2626"/>
    <rect x="200" y="-50"  width="40" height="50"  fill="#dc2626"/>
    <rect x="260" y="-25"  width="40" height="25"  fill="#dc2626"/>
    <rect x="320" y="-12"  width="40" height="12"  fill="#dc2626"/>
    <line x1="0" y1="0" x2="370" y2="0" class="axis"/>
    <polyline fill="none" stroke="#0ea5e9" stroke-width="2"
              points="40,-50 100,-95 160,-130 220,-150 280,-160 340,-165"/>
    <text x="20"  y="20" class="small">MICRO</text>
    <text x="80"  y="20" class="small">SETUP</text>
    <text x="140" y="20" class="small">SLOW</text>
    <text x="200" y="20" class="small">BREAK</text>
    <text x="260" y="20" class="small">STARTUP</text>
    <text x="320" y="20" class="small">DEFECT</text>
  </g>
</svg>
