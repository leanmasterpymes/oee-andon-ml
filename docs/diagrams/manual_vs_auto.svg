<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .h { font-size:18px; font-weight:700; fill:#0f172a; }
      .b { font-size:13px; fill:#0f172a; }
      .m { font-size:13px; fill:#dc2626; }
      .g { font-size:13px; fill:#16a34a; }
      .icn { font-size:34px; }
    </style>
  </defs>
  <rect width="900" height="320" fill="#ffffff"/>

  <rect x="20" y="20" width="420" height="280" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="40" y="55" class="h">Hoy: planilla manual</text>
  <text x="40" y="100" class="icn">📋</text>
  <text x="100" y="100" class="m">Operario llena al final del turno</text>
  <text x="40" y="140" class="icn">⏰</text>
  <text x="100" y="140" class="m">El KPI llega 1 dia / 1 semana tarde</text>
  <text x="40" y="180" class="icn">🕳️</text>
  <text x="100" y="180" class="m">Microparadas invisibles (la mayor perdida)</text>
  <text x="40" y="220" class="icn">📉</text>
  <text x="100" y="220" class="m">Datos sesgados y olvidados</text>
  <text x="40" y="265" class="b">→ Imposible decidir en caliente.</text>

  <rect x="460" y="20" width="420" height="280" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="480" y="55" class="h">Aqui: captura automatica</text>
  <text x="480" y="100" class="icn">🔌</text>
  <text x="540" y="100" class="g">PLC / sensor ESP32 → MQTT</text>
  <text x="480" y="140" class="icn">⚡</text>
  <text x="540" y="140" class="g">OEE recalculado segundo a segundo</text>
  <text x="480" y="180" class="icn">🤖</text>
  <text x="540" y="180" class="g">ML detecta microparadas no reportadas</text>
  <text x="480" y="220" class="icn">📲</text>
  <text x="540" y="220" class="g">Andon sugiere causa, operario solo confirma</text>
  <text x="480" y="265" class="b">→ Decision en planta, no auditoria.</text>
</svg>
